name: DB Audit

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Audit mode to run"
        required: true
        default: "db"
        type: choice
        options:
          - db
          - db-migration-check
          - db-math
          - db-math-migration-check

jobs:
  run-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install psycopg2-binary python-dotenv

      - name: Run DB Audit Agent
        env:
          DATABASE_URL: ${{ secrets.AUDIT_DB_URL }}
        run: |
          echo "Running DB Audit mode: ${{ github.event.inputs.mode }}"
          python main.py --mode ${{ github.event.inputs.mode }}

      - name: Upload audit result (optional)
        if: always()
        run: |
          echo "Audit completed"
