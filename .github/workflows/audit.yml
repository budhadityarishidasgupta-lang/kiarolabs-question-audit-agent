name: DB Audit Agent

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary

      - name: Run DB Audit
        env:
          AUDIT_DB_URL: ${{ secrets.AUDIT_DB_URL }}
        run: |
          python main.py --mode db
